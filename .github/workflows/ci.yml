name: CI

on:
  pull_request:
    branches: [main]

jobs:
  validate-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - name: Check conventional commit format
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          PATTERN="^(feat|fix|chore|docs|style|refactor|perf|test|build|ci|revert)(\(.+\))?!?: .+"
          if [[ ! "$TITLE" =~ $PATTERN ]]; then
            echo "❌ PR title does not follow conventional commit format."
            echo ""
            echo "Expected: <type>(<optional scope>): <description>"
            echo "Types: feat, fix, chore, docs, style, refactor, perf, test, build, ci, revert"
            echo ""
            echo "Examples:"
            echo "  feat: add donation export"
            echo "  fix(auth): resolve session timeout"
            echo "  chore: update dependencies"
            exit 1
          fi
          echo "✅ PR title is valid: $TITLE"

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: biomejs/setup-biome@v2
        with:
          version: 2.4.12

      - name: Biome CI
        run: biome ci src/

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit -p tsconfig.app.json

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Unit tests
        run: npm run test

      - name: Coverage
        run: npm run test:coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
