services:
  frontend:
    build:
      context: .
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

  api:
    image: jorgetroya/donations-api:latest
    expose:
      - "8080"
    restart: unless-stopped
    networks:
      - app
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3

networks:
  app:
    driver: bridge
